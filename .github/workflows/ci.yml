name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

env:
  DEVELOPER_DIR: /Users/tbdoadmin/ML Integration

jobs:
  build-and-test:
    runs-on: macos-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
        
    - name: Cache Dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/Library/Developer/Xcode/DerivedData
        key: ${{ runner.os }}-xcode-${{ hashFiles('**/*.pbxproj') }}
        restore-keys: |
          ${{ runner.os }}-xcode-
          
    - name: Build ML Integration
      run: |
        xcodebuild -scheme "ML Integration" \
          -destination "platform=macOS" \
          -configuration Debug \
          clean build
          
    - name: Run Unit Tests
      run: |
        xcodebuild test \
          -scheme "ML Integration" \
          -destination "platform=macOS" \
          -configuration Debug \
          -enableCodeCoverage YES \
          -resultBundlePath TestResults.xcresult
          
    - name: Run UI Tests
      run: |
        xcodebuild test \
          -scheme "ML Integration" \
          -destination "platform=macOS" \
          -configuration Debug \
          -only-testing:ML_IntegrationUITests \
          -resultBundlePath UITestResults.xcresult
          
    - name: Generate Code Coverage Report
      run: |
        xcrun xccov view \
          --report \
          --json \
          TestResults.xcresult > coverage.json
          
    - name: Upload Test Results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results
        path: |
          TestResults.xcresult
          UITestResults.xcresult
          coverage.json
          
    - name: Performance Benchmarks
      run: |
        cd "$DEVELOPER_DIR"
        ./test-environment/scripts/test.sh
        
  security-scan:
    runs-on: macos-latest
    needs: build-and-test
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Security Audit
      run: |
        echo "Running security audit..."
        find . -name "*.swift" -exec grep -l "TODO\|FIXME\|HACK" {} \;
        
  deploy-ready:
    runs-on: macos-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Create Release Build
      run: |
        xcodebuild -scheme "ML Integration" \
          -destination "platform=macOS" \
          -configuration Release \
          clean build
          
    - name: Notarize App
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        TEAM_ID: ${{ secrets.TEAM_ID }}
      run: |
        echo "Creating notarized release..."
        # Add notarization steps here
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          build/Release/ML Integration.app
        draft: false
        prerelease: false
