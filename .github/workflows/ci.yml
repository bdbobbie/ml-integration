name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      - run: xcodebuild -project "ML Integration.xcodeproj" -scheme "ML Integration" -destination "platform=macOS,arch=arm64" build
      - run: xcodebuild -project "ML Integration.xcodeproj" -scheme "ML Integration" -destination "platform=macOS,arch=arm64" -only-testing:"ML IntegrationTests" test
      - run: xcodebuild -project "ML Integration.xcodeproj" -scheme "ML Integration" -destination "platform=macOS,arch=arm64" -only-testing:"ML IntegrationUITests" test
