name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build
        run: |
          xcodebuild \
            -project "ML Integration.xcodeproj" \
            -scheme "ML Integration" \
            -destination "platform=macOS,arch=arm64" \
            build

      - name: Unit Tests
        run: |
          xcodebuild \
            -project "ML Integration.xcodeproj" \
            -scheme "ML Integration" \
            -destination "platform=macOS,arch=arm64" \
            -only-testing:"ML IntegrationTests" \
            test

      - name: UI Tests
        run: |
          xcodebuild \
            -project "ML Integration.xcodeproj" \
            -scheme "ML Integration" \
            -destination "platform=macOS,arch=arm64" \
            -only-testing:"ML IntegrationUITests" \
            test
