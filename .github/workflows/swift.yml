name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
    - uses: actions/checkout@v4
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Build App
      run: |
        xcodebuild \
          -project "ML Integration.xcodeproj" \
          -scheme "ML Integration" \
          -destination "platform=macOS,arch=arm64" \
          -derivedDataPath "$RUNNER_TEMP/DerivedData" \
          build

    - name: Run Unit Tests
      run: |
        xcodebuild \
          -project "ML Integration.xcodeproj" \
          -scheme "ML Integration" \
          -destination "platform=macOS,arch=arm64" \
          -derivedDataPath "$RUNNER_TEMP/DerivedData" \
          -only-testing:"ML IntegrationTests" \
          test

    - name: Run UI Tests
      run: |
        xcodebuild \
          -project "ML Integration.xcodeproj" \
          -scheme "ML Integration" \
          -destination "platform=macOS,arch=arm64" \
          -derivedDataPath "$RUNNER_TEMP/DerivedData" \
          -skip-testing:"ML IntegrationUITests/ML_IntegrationUITests/testCoherenceSchemaWarningAndRepairActionVisibility" \
          -only-testing:"ML IntegrationUITests" \
          test
